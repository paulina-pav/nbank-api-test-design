services:
  backend:
    image: nobugsme/nbank:with_validation_fix
    ports:
      - "4111:4111"
    networks:
      - nbank-network

  frontend:
    image: nobugsme/nbank-ui:latest
    platform: linux/amd64
    expose: # не открываем порт наружу, а даем доступ контейнерам в сети
      - "80"
    depends_on:
      - backend
    networks:
      - nbank-network

  nginx:
    image: nginx:1.27.5
    platform: linux/amd64
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nbank-network

  selenoid:
    image: aerokube/selenoid:latest
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/:/etc/selenoid/:ro
    command: ["-container-network", "nbank-network"]
    depends_on:
      - frontend
    networks:
      - nbank-network

  selenoid-ui:
    image: aerokube/selenoid-ui:latest
    platform: linux/amd64
    ports:
      - "6567:8080"
    command: ["--selenoid-uri", "http://selenoid:4444"]
    depends_on:
      - selenoid
    networks:
      - nbank-network

  tests:
    image: tilemp/nbank-tests:latest
    environment:
      TEST_PROFILE: ${TEST_PROFILE:-api}
      APIBASEURL: http://backend:4111/
      UIBASEURL: http://nginx
      UI_REMOTE: http://selenoid:4444/wd/hub
    networks:
      - nbank-network

networks:
  nbank-network:
    name: nbank-network